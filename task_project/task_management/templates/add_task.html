{% extends "base.html" %}

{% block page_title %}
Add Task
{% endblock %}

{% block content %}

<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
>

<style>

  body{
    background:#f4f6f9;
    font-family:Arial, sans-serif;
  }

  .task-box{
    max-width:700px;
    margin:50px auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
  }

  .task-box h2{
    font-size:32px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:30px;
  }

  .form-label{
    font-weight:600;
    margin-bottom:8px;
    color:#334155;
  }

  .form-control,
  .form-select{
    height:52px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    padding:12px 15px;
    transition:0.3s;
  }

  .form-control:focus,
  .form-select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.12);
  }

  textarea.form-control{
    height:auto;
    resize:none;
    min-height:120px;
  }

  .btn-primary{
    height:54px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
  }

  .btn-primary:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
  }

</style>

<div class="container">

  <div class="task-box">

    <h2 class="text-center">
      Add New Task
    </h2>

    <form method="POST">

      {% csrf_token %}

      <div class="mb-3">

        <label class="form-label">
          Task Title
        </label>

        <input
          type="text"
          class="form-control"
          name="title"
          placeholder="Enter task title"
          required
        >

      </div>

      <div class="mb-3">

        <label class="form-label">
          Description
        </label>

        <textarea
          class="form-control"
          rows="5"
          name="description"
          placeholder="Enter task description"
          required
        ></textarea>

      </div>

      <div class="mb-3">

        <label class="form-label">
          Assign User
        </label>

        <select
          class="form-select"
          name="assigned_to"
        >

          <option value="">
            Select User
          </option>

          {% for user in users %}

          <option value="{{ user.id }}">

            {{ user.first_name }} {{ user.last_name }}

          </option>

          {% endfor %}

        </select>

      </div>

      <div class="row">

        <div class="col-md-6 mb-3">

          <label class="form-label">
            Deadline
          </label>

          <input
            type="date"
            class="form-control"
            name="deadline"
          >

        </div>

        <div class="col-md-6 mb-3">

          <label class="form-label">
            Project
          </label>

          <input
            type="text"
            class="form-control"
            name="project"
            placeholder="Enter project name"
          >

        </div>

      </div>

      <button class="btn btn-primary w-100 mt-3">

        Create Task

      </button>

    </form>

  </div>

</div>

{% endblock %}
