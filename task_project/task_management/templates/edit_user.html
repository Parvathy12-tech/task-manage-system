{% extends "base.html" %}

{% block page_title %}
Edit User
{% endblock %}

{% block content %}

<style>

  body{
    background:#f1f5f9;
  }

  .user-box{

    max-width:900px;

    margin:40px auto;

    background:white;

    padding:45px;

    border-radius:24px;

    box-shadow:0 8px 25px rgba(0,0,0,0.08);

  }

  .user-box h2{

    font-size:36px;

    font-weight:700;

    color:#0f172a;

    margin-bottom:35px;

    text-align:center;

  }

  .form-label{

    font-weight:500;

    color:#334155;

    margin-bottom:8px;

  }

  .form-control,
  .form-select{

    width:100%;

    height:54px;

    border-radius:12px;

    border:1px solid #cbd5e1;

    padding:12px 15px;

    font-size:15px;

    transition:0.3s;

  }

  .form-control:focus,
  .form-select:focus{

    border-color:#2563eb;

    box-shadow:0 0 0 4px rgba(37,99,235,0.12);

  }

  textarea.form-control{

    height:auto;

    min-height:120px;

    resize:none;

  }

  input[type="file"]{

    padding:12px;

  }

  .profile-preview{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #e2e8f0;
    margin-bottom:20px;
  }

  .default-avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#dbeafe;
    color:#1d4ed8;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:700;
    margin-bottom:20px;
  }

  .image-box{
    text-align:center;
    margin-bottom:30px;
  }

  .btn-success{

    height:55px;

    border:none;

    border-radius:14px;

    font-size:16px;

    font-weight:600;

    background:#16a34a;

    transition:0.3s;

  }

  .btn-success:hover{

    background:#15803d;

    transform:translateY(-2px);

  }

</style>

<div class="container">

  <div class="user-box">

    <h2>
      Edit User
    </h2>

    <form method="POST" enctype="multipart/form-data">

      {% csrf_token %}

      <!-- Profile Image -->

      <div class="image-box">

        {% if profile.profile_image %}

        <img
          src="{{ profile.profile_image.url }}"
          class="profile-preview"
        >

        {% else %}

        <div class="default-avatar">

          {{ user_data.first_name|slice:":1" }}

        </div>

        {% endif %}

      </div>

      <div class="mb-4">

        <label class="form-label">
          Change Profile Image
        </label>

        <input
          type="file"
          class="form-control"
          name="profile_image"
          accept="image/*"
        >

      </div>

      <!-- Full Name + Email -->

      <div class="row">

        <div class="col-md-6 mb-4">

          <label class="form-label">
            Full Name
          </label>

          <input
            type="text"
            class="form-control"
            name="full_name"
            value="{{ user_data.first_name }} {{ user_data.last_name }}"
          >

        </div>

        <div class="col-md-6 mb-4">

          <label class="form-label">
            Email Address
          </label>

          <input
            type="email"
            class="form-control"
            name="email"
            value="{{ user_data.email }}"
          >

        </div>

      </div>

      <!-- Phone + Role -->

      <div class="row">

        <div class="col-md-6 mb-4">

          <label class="form-label">
            Phone Number
          </label>

          <input
            type="text"
            class="form-control"
            name="phone"
            value="{{ profile.phone|default:'' }}"
          >

        </div>

        <div class="col-md-6 mb-4">

          <label class="form-label">
            Role
          </label>

          <select class="form-select" name="role">

            <option value="admin"
            {% if profile.role == "admin" %}selected{% endif %}>
              Admin
            </option>

            <option value="developer"
            {% if profile.role == "developer" %}selected{% endif %}>
              Developer
            </option>

            <option value="tester"
            {% if profile.role == "tester" %}selected{% endif %}>
              Tester
            </option>

          </select>

        </div>

      </div>

      <!-- Status -->

      <div class="row">

        <div class="col-md-6 mb-4">

          <label class="form-label">
            Status
          </label>

          <select class="form-select" name="status">

            <option value="active"
            {% if profile.status == "active" %}selected{% endif %}>
              Active
            </option>

            <option value="disabled"
            {% if profile.status == "disabled" %}selected{% endif %}>
              Disabled
            </option>

          </select>

        </div>

      </div>

      <!-- Address -->

      <div class="mb-4">

        <label class="form-label">
          Address
        </label>

        <textarea
          class="form-control"
          name="address"
          rows="5"
        >{{ profile.address|default:'' }}</textarea>

      </div>

      <!-- Button -->

      <button class="btn btn-success w-100">

        Update User

      </button>

    </form>

  </div>

</div>

{% endblock %}
